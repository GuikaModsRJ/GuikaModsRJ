<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="description" content="Tutoriais de instalação e modelagem para GTA SA - Guika Mods RJ."/>
<title>Tutoriais — Guika Mods RJ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* --- ESTILO VISUAL IDÊNTICO AO INDEX --- */
:root {
  --bg: #09090b;
  --panel: #18181b;
  --panel-hover: #27272a;
  --text: #e4e4e7;
  --muted: #a1a1aa;
  --border: 1px solid rgba(255, 255, 255, 0.1);
  --radius: 12px;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
}

@keyframes fadeInPage { 0% { opacity: 0; } 100% { opacity: 1; } }

body {
  margin: 0; font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  background-image: radial-gradient(circle at 50% 0%, #1c1c1c 0%, var(--bg) 70%);
  color: var(--text); line-height: 1.6;
  animation: fadeInPage 0.6s ease-out forwards;
}

header {
  background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100;
  border-bottom: var(--border);
}

.container {max-width:1200px; margin:0 auto; padding:0 1rem;}
.header-inner {display:flex; align-items:center; justify-content:space-between; padding:1rem 0;}

.logo {
  color: var(--text); text-decoration: none; font-weight: 700; font-size: 1.3rem;
  text-shadow: 0 0 10px rgba(255,255,255,0.1);
}

nav ul {list-style:none; display:flex; gap:1rem; margin:0; padding:0;}
nav a {
  text-decoration: none; color: var(--muted); padding: 0.5rem 0.9rem;
  border-radius: var(--radius); transition: all 0.2s ease; font-weight: 500;
}
nav a:hover, nav a.active { background: rgba(255,255,255,0.1); color: #fff; }

/* --- GRID DE VÍDEOS AJUSTADO --- */
.tutorial-grid {
  display: grid;
  /* Diminuído o minmax para 280px para caberem mais vídeos e ficarem menores */
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.5rem;
  margin-top: 2rem;
  padding-bottom: 3rem;
}

.video-card {
  background: var(--panel); 
  border: var(--border); 
  border-radius: var(--radius);
  overflow: hidden; 
  box-shadow: var(--shadow); 
  transition: transform 0.3s, border-color 0.3s;
  display: flex;
  flex-direction: column;
}

.video-card:hover {
  transform: translateY(-5px); 
  border-color: rgba(255,255,255,0.3);
}

/* PLAYER YOUTUBE COM PROPORÇÃO UNIFORME */
.video-wrapper {
  position: relative; 
  width: 100%;
  aspect-ratio: 16 / 9; /* Garante que todos tenham a mesma altura proporcional */
  background: #000;
}

.video-wrapper iframe {
  position: absolute; 
  top: 0; 
  left: 0; 
  width: 100%; 
  height: 100%; 
  border: 0;
}

.card-content {
  padding: 1.2rem;
  flex-grow: 1;
}

.card-content h3 {
  margin: 0 0 0.5rem 0; 
  font-size: 1.1rem; 
  color: #fff;
  line-height: 1.3;
}

.card-content p {
  color: var(--muted); 
  font-size: 0.85rem; 
  margin: 0;
}

.page-title { text-align: center; margin: 3rem 0 1rem; font-size: 2rem; color: #fff; }

.footer {
  background: #050505; padding: 2rem 0; border-top: var(--border);
  margin-top: 4rem; text-align: center; color: var(--muted);
}
.footer a { color: var(--muted); text-decoration: none; margin: 0 0.5rem; }
.footer a:hover { color: #fff; }

@media(max-width: 768px) {
  .header-inner { flex-direction: column; gap: 1rem; }
  .tutorial-grid { grid-template-columns: 1fr; } /* Em telemóveis ocupa a largura total */
}
</style>
</head>
<body>

<header>
  <div class="container header-inner">
    <a aria-label="Página inicial" class="logo" href="index.html">Guika Mods RJ</a>
    <nav>
      <ul>
        <li><a href="index.html">← Voltar ao Início</a></li>
        <li><a class="active" href="tutoriais.html">Galeria de Tutoriais</a></li>
        <li><a href="https://www.youtube.com/@GuikaModsRJ" target="_blank">Canal YT</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="container">
  <h2 class="page-title">Aprenda a Instalar e Criar Mods</h2>
  <p style="text-align:center; color:var(--muted); margin-bottom: 2rem;">Confira nossos tutoriais exclusivos em vídeo.</p>
  
  <div id="grade-videos" class="tutorial-grid"></div>
</main>

<footer class="footer">
  <div class="container">
    <p>© 2025 Guika Mods RJ. Todos os direitos reservados.</p>
    <div><a href="index.html">Início</a> • <a href="contato.html">Contato</a></div>
  </div>
</footer>

<script>
  // --- ADICIONE SEUS VÍDEOS AQUI ---
  const meusVideos = [
    {
      titulo: "Como Instalar Mods no GTA SA",
      id: "M7lc1UVf-VE", 
      descricao: "Aprenda o passo a passo para colocar mods sem erros."
    },
    {
      titulo: "Tutorial ZModeler: Criando Peças",
      id: "dQw4w9WgXcQ", 
      descricao: "Introdução básica à modelagem 3D para iniciantes."
    }
  ];

  const container = document.getElementById('grade-videos');
  
  if(meusVideos.length === 0){
      container.innerHTML = "<p style='text-align:center; color:#666;'>Em breve...</p>";
  }

  meusVideos.forEach(video => {
    const card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = `
      <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/${video.id}" title="${video.titulo}" allowfullscreen></iframe>
      </div>
      <div class="card-content">
        <h3>${video.titulo}</h3>
        <p>${video.descricao}</p>
      </div>
    `;
    container.appendChild(card);
  });
</script>

</body>
</html>
